# Kafka server configuration for KRaft mode
# NOTE: This file is overwritten at runtime by the entrypoint script.
# All configuration should be done via environment variables.
# See entrypoint.d/scripts/init/02-config.sh for details.
#
# Available environment variables:
#   KAFKA_PROCESS_ROLES              - broker,controller (default: broker,controller)
#   KAFKA_NODE_ID                    - Node ID (default: 1)
#   KAFKA_CONTROLLER_QUORUM_VOTERS   - Controller quorum (default: 1@localhost:9093)
#   KAFKA_LISTENERS                  - Listeners (default: PLAINTEXT://:9092,CONTROLLER://:9093)
#   KAFKA_ADVERTISED_LISTENERS       - Advertised listeners (default: PLAINTEXT://localhost:9092)
#   KAFKA_NUM_NETWORK_THREADS        - Network threads (default: 3)
#   KAFKA_NUM_IO_THREADS             - I/O threads (default: 8)
#   KAFKA_NUM_PARTITIONS             - Default partitions (default: 1)
#   KAFKA_LOG_RETENTION_HOURS        - Log retention hours (default: 168)
#   KAFKA_LOG_SEGMENT_BYTES          - Log segment size (default: 1073741824)
#   KAFKA_CONFIG_*                   - Any additional Kafka config property
#
# For custom properties not covered by env vars, use KAFKA_CONFIG_<PROPERTY_NAME>
# Example: KAFKA_CONFIG_LOG_CLEANER_ENABLE=true -> log.cleaner.enable=true

# Minimal placeholder - will be replaced at runtime
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@localhost:9093
controller.listener.names=CONTROLLER
listeners=PLAINTEXT://:9092,CONTROLLER://:9093
inter.broker.listener.name=PLAINTEXT
advertised.listeners=PLAINTEXT://localhost:9092
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600
num.partitions=1
num.recovery.threads.per.data.dir=1
log.dirs=/opt/kafka/data
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000
group.initial.rebalance.delay.ms=0
