name: Build and Publish Apache Kafka Container
permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - "apache-kafka-*"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.extract.outputs.container }}
      revision: ${{ steps.extract.outputs.revision }}
      matrix: ${{ steps.versions.outputs.matrix }}
      context: ${{ steps.versions.outputs.context }}
    steps:
      - name: Extract container and revision
        id: extract
        run: |
          TAG=${{ github.ref_name }}
          # Handle "apache-kafka-<revision>" format (e.g., postgresql-r0.0.26)
          if [[ "$TAG" =~ ^apache-kafka-(.+)$ ]]; then
            CONTAINER="apache-kafka"
            REVISION="${BASH_REMATCH[1]}"
          else
            echo "Invalid tag format. Expected: apache-kafka-<revision> (e.g., apache-kafka-r1.0.0)"
            exit 1
          fi
          echo "container=$CONTAINER" >> $GITHUB_OUTPUT
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Set matrix and context for Apache Kafka
        id: versions
        run: |
          # Supported Kafka versions based on Apache Kafka releases
          MATRIX='[
            {"version": "3.9.2", "kafka_version": "3.9.2", "java_version": "21"},
            {"version": "4.0.2", "kafka_version": "4.0.2", "java_version": "21"},
            {"version": "4.1.2", "kafka_version": "4.1.2", "java_version": "21"},
            {"version": "4.2.0", "kafka_version": "4.2.0", "java_version": "21"}
          ]'
          CONTEXT="docker/apache-kafka"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "context=$CONTEXT" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: |
          VERSION=${{ matrix.version }}
          REVISION=${{ needs.setup.outputs.revision }}
          TAG="$VERSION-$REVISION"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ needs.setup.outputs.context }}
          push: true
          build-args: |
            KAFKA_VERSION=${{ matrix.kafka_version }}
            JAVA_VERSION=${{ matrix.java_version }}
          tags: ghcr.io/${{ github.repository_owner }}/containers/${{ needs.setup.outputs.container }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
